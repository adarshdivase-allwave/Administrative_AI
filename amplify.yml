# AWS Amplify Hosting — fullstack Gen 2 (backend + Vite React frontend).
# After you connect this GitHub repo in the Amplify Console, every push to the
# tracked branch runs: backend (CDK pipeline-deploy) → frontend (npm run build).
#
# Console: AWS Amplify → your app → Hosting → Connect branch → GitHub → select
# repository `adarshdivase-allwave/Administrative_AI` and branch `main`.
#
# Optional override: Amplify Console → Environment variables → APP_ENV
# If unset, `amplify/synth-env.ts` sets APP_ENV from AWS_BRANCH (main → prod).
# Frontend: VITE_APP_ENV is set in preBuild from AWS_BRANCH to match.
#
# Prerequisites in the AWS account (one-time): Secrets Manager secret
#   av-inventory/gemini-api-key  with {"apiKey":"..."}  (see docs/deployment/02-first-deploy.md)

version: 1

# Use Node 20 for the whole job WITHOUT `nvm install` — on Amplify's image,
# `nvm install 20` triggers ~/.nvm/default-packages and runs a massive
# `npm install -g @aws-amplify/cli cypress ...` (minutes + often fails / OOM).
# _LIVE_UPDATES switches the preinstalled runtime before any phase runs.
# Ref: https://docs.aws.amazon.com/amplify/latest/userguide/edit-build-settings.html
env:
  variables:
    # JSON for Amplify live updates; YAML double-quotes so inner " do not break the build's export.
    _LIVE_UPDATES: "[{\"name\":\"Node.js version\",\"pkg\":\"node\",\"type\":\"nvm\",\"version\":\"20\"}]"

# React Router / client-side routes — serve index.html for non-file paths
customRules:
  - source: "/<*>"
    target: "/index.html"
    status: "404-200"

backend:
  phases:
    build:
      commands:
        - node --version
        - npm --version
        # Bundled Amplify/CDK deps make `npm ci` reject the lockfile; install respects the committed lockfile + cache.
        - npm install --no-audit --no-fund --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID

frontend:
  phases:
    preBuild:
      commands:
        - |
            cd frontend
            if [ "$AWS_BRANCH" = "main" ] || [ "$AWS_BRANCH" = "master" ]; then export VITE_APP_ENV=prod; elif [ "$AWS_BRANCH" = "staging" ]; then export VITE_APP_ENV=staging; else export VITE_APP_ENV=dev; fi
            echo "VITE_APP_ENV=$VITE_APP_ENV (AWS_BRANCH=$AWS_BRANCH)"
            npm ci --cache .npm --prefer-offline
    build:
      commands:
        - |
            cd frontend
            if [ "$AWS_BRANCH" = "main" ] || [ "$AWS_BRANCH" = "master" ]; then export VITE_APP_ENV=prod; elif [ "$AWS_BRANCH" = "staging" ]; then export VITE_APP_ENV=staging; else export VITE_APP_ENV=dev; fi
            npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - "**/*"
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
      - frontend/.npm/**/*
      - frontend/node_modules/**/*
